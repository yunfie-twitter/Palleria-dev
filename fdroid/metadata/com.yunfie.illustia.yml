Summary: Pixivのイラスト・漫画・作品を快適に閲覧できる、シンプルで使いやすい非公式クライアントです。
Description: |-
  Pixivのイラスト・漫画・作品を快適に閲覧できる、シンプルで使いやすい非公式クライアントです。

  主な機能:
  - イラスト・漫画の閲覧
  - おすすめ・ランキング・新着フィード
  - 強力な検索機能（タグ・ユーザー）
  - ブックマーク管理
  - 画像保存機能

