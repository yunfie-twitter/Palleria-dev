name: F-Droid Repository & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 9.4.1

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get Version Info
        id: version
        run: |
          # build.gradleからversionNameとversionCodeを堅牢に抽出
          VERSION_NAME=$(grep "versionName" app/build.gradle | head -n 1 | awk -F'"' '{print $2}' | sed "s/'//g")
          VERSION_CODE=$(grep "versionCode" app/build.gradle | head -n 1 | awk '{print $NF}')
          
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME=$(grep "versionName" app/build.gradle | head -n 1 | awk -F"'" '{print $2}')
          fi
          
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION_NAME ($VERSION_CODE)"

      - name: Cancel if duplicate tag already exists
        if: github.ref == 'refs/heads/main'
        run: |
          TAG_NAME="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG_NAME" | grep -q "refs/tags/$TAG_NAME"; then
            echo "Tag $TAG_NAME already exists on origin. Stopping this run."
            exit 78
          fi

      - name: Cancel if release already exists
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists. Stopping this run."
            exit 78
          fi

      - name: Create and Push Tag
        if: github.ref == 'refs/heads/main'
        run: |
          TAG_NAME="${{ steps.version.outputs.tag }}"
          if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Creating new tag: $TAG_NAME"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          else
            echo "Tag $TAG_NAME already exists, skipping."
          fi

      - name: Build APKs
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ../release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get remove -y fdroidserver || true
          sudo apt-get install -y python3-pip python3-setuptools libjpeg-dev zlib1g-dev
          pipx install fdroidserver
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Update F-Droid Repository
        run: |
          mkdir -p public/repo
          mkdir -p public/metadata
          
          # 1. gh-pages から既存の資産（過去のAPKやアイコン、メタデータ）をコピーして保持
          git clone --branch gh-pages --single-branch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git old-repo || true
          if [ -d old-repo/repo ]; then
            echo "Copying existing APKs and icons..."
            cp -r old-repo/repo/. public/repo/
          fi
          if [ -d old-repo/metadata ]; then
            echo "Copying existing metadata from gh-pages..."
            cp -r old-repo/metadata/. public/metadata/
          fi
          
          # 2. ソースコード側の fdroid/metadata があればマージ
          if [ -d fdroid/metadata ]; then
            echo "Merging metadata from source..."
            cp -r fdroid/metadata/. public/metadata/
          fi
          
          # 3. 今回ビルドされた新しいAPKをコピー
          cp app/build/outputs/apk/release/*.apk public/repo/
          
          cd public
          cat <<EOF > config.yml
          repo_url: https://yunfi.f5.si/${{ github.event.repository.name }}/repo
          repo_name: Palleria Dev Repository
          repo_description: Development builds for Palleria
          archive_older: 0
          keystore: ../release.keystore
          keystorepass: "${{ secrets.RELEASE_KEYSTORE_PASSWORD }}"
          keypass: "${{ secrets.RELEASE_KEY_PASSWORD }}"
          keyalias: "${{ secrets.RELEASE_KEY_ALIAS }}"
          repo_keyalias: "${{ secrets.RELEASE_KEY_ALIAS }}"
          repo_keystorepass: "${{ secrets.RELEASE_KEYSTORE_PASSWORD }}"
          repo_keypass: "${{ secrets.RELEASE_KEY_PASSWORD }}"
          EOF
          chmod 600 config.yml
          
          fdroid update --create-metadata --pretty
          
          rm config.yml
          cd ..

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: false

      - name: Create GitHub Release
        # タグの直接プッシュ、mainへのプッシュ（自動タグ生成後）のどちらでも確実に動くように条件を最適化
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
