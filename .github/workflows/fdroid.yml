name: F-Droid Repository & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      buildgradle: ${{ steps.filter.outputs.buildgradle }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            buildgradle:
              - 'app/build.gradle'
              # Kotlin DSLの場合は追加
              # - 'app/build.gradle.kts'

  build:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.buildgradle == 'true'

    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 9.4.1

      - name: Set up Rust Android toolchain
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android
          cargo install cargo-ndk --locked

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get Version Info
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | head -n 1 | awk -F'"' '{print $2}' | sed "s/'//g")
          VERSION_CODE=$(grep "versionCode" app/build.gradle | head -n 1 | awk '{print $NF}')

          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME=$(grep "versionName" app/build.gradle | head -n 1 | awk -F"'" '{print $2}')
          fi

          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION_NAME" >> $GITHUB_OUTPUT

          echo "Detected version: $VERSION_NAME ($VERSION_CODE)"

      - name: Cancel if duplicate tag already exists
        if: github.ref == 'refs/heads/main'
        run: |
          TAG_NAME="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG_NAME" | grep -q "refs/tags/$TAG_NAME"; then
            echo "Tag $TAG_NAME already exists on origin."
            exit 78
          fi

      - name: Cancel if release already exists
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release already exists."
            exit 78
          fi

      - name: Create and Push Tag
        if: github.ref == 'refs/heads/main'
        run: |
          TAG_NAME="${{ steps.version.outputs.tag }}"
          if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

      - name: Build APKs
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ../release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get remove -y fdroidserver || true
          sudo apt-get install -y python3-pip python3-setuptools libjpeg-dev zlib1g-dev
          pipx install fdroidserver
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Update F-Droid Repository
        run: |
          mkdir -p public/repo
          mkdir -p public/metadata

          git clone --branch gh-pages --single-branch \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git old-repo || true

          [ -d old-repo/repo ] && cp -r old-repo/repo/. public/repo/
          [ -d old-repo/metadata ] && cp -r old-repo/metadata/. public/metadata/
          [ -d fdroid/metadata ] && cp -r fdroid/metadata/. public/metadata/

          cp app/build/outputs/apk/release/*.apk public/repo/

          cd public

          cat <<EOF > config.yml
          repo_url: https://yunfi.f5.si/${{ github.event.repository.name }}/repo
          repo_name: Palleria Dev Repository
          repo_description: Development builds for Palleria
          archive_older: 0
          keystore: ../release.keystore
          keystorepass: "${{ secrets.RELEASE_KEYSTORE_PASSWORD }}"
          keypass: "${{ secrets.RELEASE_KEY_PASSWORD }}"
          keyalias: "${{ secrets.RELEASE_KEY_ALIAS }}"
          repo_keyalias: "${{ secrets.RELEASE_KEY_ALIAS }}"
          repo_keystorepass: "${{ secrets.RELEASE_KEYSTORE_PASSWORD }}"
          repo_keypass: "${{ secrets.RELEASE_KEY_PASSWORD }}"
          EOF

          chmod 600 config.yml
          fdroid update --create-metadata --pretty
          rm config.yml

          cd ..

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}