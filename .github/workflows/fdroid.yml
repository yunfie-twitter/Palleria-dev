name: F-Droid Repository & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APKs
        run: ./gradlew assemble
        env:
          KEYSTORE_PATH: ../release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get remove -y fdroidserver || true
          sudo apt-get install -y python3-pip python3-setuptools libjpeg-dev zlib1g-dev
          pipx install fdroidserver
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Update F-Droid Repository
        run: |
          mkdir -p fdroid/repo
          cp app/build/outputs/apk/release/*.apk fdroid/repo/
          
          cd fdroid
          # 最小限のconfig.ymlを作成
          cat <<EOF > config.yml
          repo_url: https://yunfie-twitter.github.io/Illustia-dev/repo
          repo_name: Illustia Dev Repository
          repo_description: Development builds for Illustia
          
          # インデックスの署名にアプリと同じキーストアを使用
          keystore: ../release.keystore
          repo_keystorepass: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          repo_keyalias: ${{ secrets.RELEASE_KEY_ALIAS }}
          repo_keypass: ${{ secrets.RELEASE_KEY_PASSWORD }}
          EOF
          chmod 600 config.yml
          
          # インデックス(index-v1.jar等)を生成
          fdroid update --create-metadata
          rm config.yml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./fdroid
          publish_branch: gh-pages
          force_orphan: true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
